<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>I've Seen Things</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Libre+Baskerville:ital,wght@0,400;1,400;1,700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0A0E1A; color: #E8DFC0; font-family: 'Space Mono', monospace; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .wrap { max-width: 680px; width: 100%; }
    h1 { font-family: 'Libre Baskerville', serif; font-style: italic; font-size: 32px; margin-bottom: 4px; }
    .sub { font-size: 10px; color: #4A5A7A; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 2rem; }
    .input-row { display: flex; gap: 10px; margin-bottom: 10px; }
    input { flex: 1; background: #12182E; border: 1px solid #1E2A4A; border-radius: 6px; color: #E8DFC0; font-family: 'Space Mono', monospace; font-size: 12px; padding: 12px 16px; outline: none; }
    input:focus { border-color: #00D4C8; }
    input::placeholder { color: #2A3A5A; }
    button.trace { background: #C45C26; border: none; border-radius: 6px; color: #E8DFC0; font-family: 'Space Mono', monospace; font-size: 12px; padding: 12px 24px; cursor: pointer; font-weight: 700; letter-spacing: 0.04em; }
    button.trace:hover { background: #D96A30; }
    button.trace:disabled { background: #2A3A5A; cursor: not-allowed; }
    .demos { display: flex; gap: 8px; margin-bottom: 1.5rem; flex-wrap: wrap; align-items: center; }
    .demo-lbl { font-size: 10px; color: #2A3A5A; }
    .demo-btn { background: #12182E; border: 1px solid #1E2A4A; border-radius: 4px; color: #4A5A7A; font-family: 'Space Mono', monospace; font-size: 10px; padding: 4px 10px; cursor: pointer; }
    .demo-btn:hover { border-color: #00D4C8; color: #00D4C8; }
    .status { font-size: 11px; color: #00D4C8; min-height: 18px; margin-bottom: 6px; }
    .error { color: #C45C26; font-size: 11px; margin-bottom: 8px; min-height: 14px; }
    .card { background: #12182E; border: 1px solid #1E2A4A; border-radius: 8px; padding: 1.25rem; margin-top: 1.5rem; display: none; }
    .card.show { display: block; }
    .coin-lbl { font-size: 10px; color: #4A5A7A; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 4px; }
    .coin-name { font-size: 22px; color: #00D4C8; font-weight: 700; margin-bottom: 4px; }
    .coin-meta { font-size: 11px; color: #3A4A6A; }
    .story { font-family: 'Libre Baskerville', serif; font-style: italic; font-size: 15px; line-height: 1.95; color: #D4C8A8; border-left: 2px solid #C45C26; padding-left: 1.25rem; margin-top: 1.25rem; }
    hr { border: none; border-top: 1px solid #1E2A4A; margin: 1.25rem 0; }
    .tl-lbl { font-size: 10px; color: #2A3A5A; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 12px; }
    .event { display: flex; gap: 12px; margin-bottom: 10px; align-items: flex-start; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #C45C26; margin-top: 4px; flex-shrink: 0; }
    .dot.t { background: #00D4C8; }
    .dot.g { background: #C4962A; }
    .ev-time { font-size: 10px; color: #2A3A5A; margin-bottom: 2px; }
    .ev-text { font-size: 11px; color: #6B7A9A; line-height: 1.6; }
    .addr { font-size: 10px; background: #1A2540; color: #00D4C8; border-radius: 3px; padding: 1px 5px; }
    .foot { font-size: 10px; color: #2A3A5A; margin-top: 1.25rem; line-height: 1.7; }
    .spin { display: inline-block; width: 9px; height: 9px; border: 1px solid #00D4C820; border-top-color: #00D4C8; border-radius: 50%; animation: sp 0.7s linear infinite; margin-right: 6px; vertical-align: middle; }
    @keyframes sp { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>I've Seen Things</h1>
    <p class="sub">Every coin has a past. Find yours.</p>

    <div class="input-row">
      <input id="walletInput" placeholder="Paste a Base wallet address (0x...)" autocomplete="off" spellcheck="false"/>
      <button class="trace" id="traceBtn" onclick="traceWallet()">Trace</button>
    </div>

    <div class="demos">
      <span class="demo-lbl">try:</span>
      <button class="demo-btn" onclick="setAddr('0xd8dA6BF26964aF9D7eEd9e03E53415D37aA96045')">vitalik.eth</button>
      <button class="demo-btn" onclick="setAddr('0x4838B106FCe9647Bdf1E7877BF73cE8B0BAD5f97')">hayden.eth</button>
      <button class="demo-btn" onclick="setAddr('0x3cd751e6b0078be393132286c442345e5dc49699')">coinbase hot wallet</button>
    </div>

    <div class="status" id="statusLine"></div>
    <div class="error" id="errorLine"></div>

    <div class="card" id="resultCard">
      <p class="coin-lbl">Most Interesting Token Found</p>
      <p class="coin-name" id="coinName">—</p>
      <p class="coin-meta" id="coinMeta">—</p>
      <p class="story" id="storyText"></p>
      <hr>
      <p class="tl-lbl">Transfer trail</p>
      <div id="timeline"></div>
      <p class="foot">Transfer history via Alchemy · Base mainnet · Labels from curated contract registry</p>
    </div>
  </div>

  <script>
    const LABELS = {
      '0x3154cf16ccdb4c6d922629664174b904d80f2c35':'Base Bridge',
      '0x4200000000000000000000000000000000000006':'WETH',
      '0x833589fcd6edb6e08f4c7c32d4f71b54bda02913':'USDC',
      '0x2626664c2603336e57b271c5c0b26f421741e481':'Uniswap V3 Router',
      '0x000000000000000000000000000000000000dead':'Burn Address',
      '0x4c0c863aa884b8d8e0b25f2e27b9d30a81a35e0e':'Aerodrome Router',
      '0xaaa87963efeb6f7e0a2711f397663105acb1805e':'Aerodrome Pool',
      '0x6921b130d297cc43754afba22e5eac0fbf8db75b':'Base Bridge Official',
      '0x19793c7824be70ec58bb673ca42d2779d12581be':'Moonwell',
      '0x23a491f5c05e8f748cc97bab3d738f2d93ff6e01':'Polymarket',
      '0xdef1c0ded9bec7f1a1670819833240f027b25eff':'0x Exchange',
      '0x1231deb6f5749ef6ce6943a275a1d3e7486f4eae':'LI.FI Router',
    };

    function label(addr) {
      if (!addr) return '?';
      const l = addr.toLowerCase();
      return LABELS[l] || (addr.slice(0,6) + '…' + addr.slice(-4));
    }

    function setAddr(a) { document.getElementById('walletInput').value = a; }
    function setStatus(m) { document.getElementById('statusLine').innerHTML = m ? `<span class="spin"></span>${m}` : ''; }
    function setError(m) { document.getElementById('errorLine').textContent = m || ''; }

    function scoreTransfer(t) {
      let s = 0;
      if (LABELS[(t.from||'').toLowerCase()]) s += 25;
      if (LABELS[(t.to||'').toLowerCase()]) s += 25;
      const v = parseFloat(t.value||0);
      if (v > 100) s += 20;
      if (v > 1000) s += 20;
      if (t.asset && t.asset !== 'ETH') s += 10;
      s += Math.random() * 5;
      return s;
    }

    async function traceWallet() {
      const addr = document.getElementById('walletInput').value.trim();
      setError('');
      document.getElementById('resultCard').classList.remove('show');

      if (!/^0x[0-9a-fA-F]{40}$/.test(addr)) {
        setError('Please enter a valid Base wallet address (0x...)');
        return;
      }

      const btn = document.getElementById('traceBtn');
      btn.disabled = true;

      try {
        setStatus('Scanning transfer history via Alchemy…');
        const res = await fetch('/api/trace', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ address: addr })
        });
        const json = await res.json();
        const transfers = json.result?.transfers || [];

        if (!transfers.length) {
          setStatus('');
          setError('No transfers found for this address on Base. Try a different wallet.');
          btn.disabled = false;
          return;
        }

        setStatus('Picking the most interesting coin…');
        await new Promise(r => setTimeout(r, 300));

        const sorted = [...transfers].sort((a,b) => scoreTransfer(b) - scoreTransfer(a));
        const top = sorted[0];
        const events = sorted.slice(0,6).map(t => ({
          from: t.from, to: t.to,
          asset: t.asset || '?',
          value: parseFloat(t.value||0).toFixed(4),
          block: t.blockNum
        }));

        setStatus('Writing the story…');

        const eventSummary = events.map(e =>
          `  ${e.asset} from ${label(e.from)} → ${label(e.to)}, value: ${e.value}, block: ${e.block}`
        ).join('\n');

        const prompt = `You are writing a short, dramatic, first-person biography of a crypto token on Base blockchain — told from the token's perspective. The tone should be darkly comedic, world-weary, and vivid. The coin has been through it — gambling, degen trades, MEV bots, shady wallets, bridges, swaps. It has seen things and has feelings about them. Reference real on-chain events from the data below.

Wallet: ${addr}
Top token: ${top.asset || 'ETH'}
Recent inbound transfers:
${eventSummary}

Write 4-6 sentences. First person. No markdown. Gambling and chaos should feature prominently if the data supports it. Make it feel like the coin lived a full, chaotic life before landing here. End with dark humor or quiet resignation. Be specific — name Uniswap, Aerodrome, Base Bridge etc. where relevant.`;

        const storyRes = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'claude-sonnet-4-6',
            max_tokens: 1000,
            messages: [{ role: 'user', content: prompt }]
          })
        });
        const storyData = await storyRes.json();
        const story = storyData.content?.[0]?.text || 'Story unavailable.';

        document.getElementById('coinName').textContent = top.asset || 'ETH';
        document.getElementById('coinMeta').textContent =
          `${transfers.length} transfers found · Most recent from ${label(top.from)}`;

        const storyEl = document.getElementById('storyText');
        storyEl.textContent = '';
        document.getElementById('resultCard').classList.add('show');

        let i = 0;
        const chars = story.split('');
        function type() { if (i < chars.length) { storyEl.textContent += chars[i++]; setTimeout(type, 16); } }
        type();

        const tl = document.getElementById('timeline');
        const dots = ['t','g',''];
        tl.innerHTML = events.map((e,i) => `
          <div class="event">
            <div class="dot ${dots[i%3]}"></div>
            <div>
              <div class="ev-time">Block ${parseInt(e.block,16).toLocaleString()} · ${e.asset} ${e.value}</div>
              <div class="ev-text">
                <span class="addr">${label(e.from)}</span>
                <span style="color:#2A3A5A;margin:0 6px">→</span>
                <span class="addr">${label(e.to)}</span>
              </div>
            </div>
          </div>`).join('');

        setStatus('');
      } catch(e) {
        setStatus('');
        setError('Error: ' + (e.message || 'Something went wrong.'));
      }
      btn.disabled = false;
    }

    document.getElementById('walletInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') traceWallet();
    });
  </script>
</body>
</html>

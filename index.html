<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>I've Seen Things</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Libre+Baskerville:ital,wght@0,400;1,400;1,700&display=swap" rel="stylesheet">
  <style>
    :root[data-theme="dark"] {
      --bg: #0E0C0A;
      --bg2: #13100D;
      --card-bg: #1A1612;
      --border: #2A2218;
      --text: #E8DFC0;
      --sub: #5A4A3A;
      --placeholder: #3A2A1A;
      --accent: #00C4B8;
      --orange: #C45C26;
      --orange-hover: #D96A30;
      --disabled: #2A2218;
      --story-text: #D4C8A8;
      --ev-text: #7A6A5A;
      --addr-bg: #201A12;
      --foot: #3A2A1A;
      --demo-color: #5A4A3A;
      --toggle-bg: #1A1612;
      --toggle-border: #2A2218;
      --toggle-icon: #8A7A6A;
      --grain-opacity: 0.045;
      --vignette: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.7) 100%);
    }
    :root[data-theme="light"] {
      --bg: #F2EBE0;
      --bg2: #EDE4D8;
      --card-bg: #FAF5EE;
      --border: #D8CCBA;
      --text: #1A1208;
      --sub: #8A7A6A;
      --placeholder: #C8B8A0;
      --accent: #007A74;
      --orange: #C45C26;
      --orange-hover: #D96A30;
      --disabled: #C8B8A8;
      --story-text: #2A1A0A;
      --ev-text: #5A4A3A;
      --addr-bg: #EAE0D0;
      --foot: #9A8A7A;
      --demo-color: #7A6A5A;
      --toggle-bg: #FAF5EE;
      --toggle-border: #D8CCBA;
      --toggle-icon: #5A4A3A;
      --grain-opacity: 0.025;
      --vignette: radial-gradient(ellipse at center, transparent 55%, rgba(180,160,130,0.3) 100%);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      transition: background 0.4s, color 0.4s;
      position: relative;
      overflow-x: hidden;
    }

    /* Film grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
      opacity: var(--grain-opacity);
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 128px 128px;
    }

    /* Vignette */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: var(--vignette);
      pointer-events: none;
      z-index: 9998;
      transition: background 0.4s;
    }

    .wrap { max-width: 680px; width: 100%; position: relative; z-index: 1; }

    /* Header */
    .top-bar { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 2.5rem; }

    h1 {
      font-family: 'Libre Baskerville', serif;
      font-style: italic;
      font-size: 38px;
      color: var(--text);
      line-height: 1;
      margin-bottom: 6px;
      min-height: 46px;
    }

    .cursor {
      display: inline-block;
      width: 2px;
      height: 0.85em;
      background: var(--orange);
      margin-left: 2px;
      vertical-align: middle;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    .sub-rotate {
      font-size: 10px;
      color: var(--sub);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      min-height: 14px;
    }

    .location-card {
      font-size: 9px;
      color: var(--foot);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-top: 5px;
    }

    .theme-toggle {
      background: var(--toggle-bg);
      border: 1px solid var(--toggle-border);
      border-radius: 4px;
      color: var(--toggle-icon);
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      padding: 7px 11px;
      cursor: pointer;
      transition: all 0.2s;
      flex-shrink: 0;
      margin-left: 1rem;
      margin-top: 4px;
      letter-spacing: 0.05em;
    }
    .theme-toggle:hover { border-color: var(--accent); color: var(--accent); }

    /* Input */
    .input-row { display: flex; gap: 10px; margin-bottom: 10px; }
    input {
      flex: 1;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      padding: 12px 16px;
      outline: none;
      transition: border-color 0.2s, background 0.4s;
    }
    input:focus { border-color: var(--accent); }
    input::placeholder { color: var(--placeholder); }

    button.trace {
      background: var(--orange);
      border: none;
      border-radius: 4px;
      color: #F0E8D8;
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      padding: 12px 24px;
      cursor: pointer;
      font-weight: 700;
      letter-spacing: 0.06em;
      transition: background 0.2s;
    }
    button.trace:hover { background: var(--orange-hover); }
    button.trace:disabled { background: var(--disabled); cursor: not-allowed; color: var(--sub); }

    /* Demos + usage row */
    .controls-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.75rem; flex-wrap: wrap; gap: 8px; }
    .demos { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .demo-lbl { font-size: 10px; color: var(--sub); }
    .demo-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--demo-color);
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      padding: 3px 9px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .demo-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* Usage pips — integrated right side */
    .usage-bar { display: flex; align-items: center; gap: 8px; }
    .usage-label { font-size: 9px; color: var(--foot); text-transform: uppercase; letter-spacing: 0.1em; }
    .usage-pips { display: flex; gap: 4px; }
    .pip {
      width: 6px; height: 6px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: transparent;
      transition: background 0.3s, border-color 0.3s;
    }
    .pip.used { background: var(--orange); border-color: var(--orange); }

    /* Status / error */
    .status { font-size: 11px; color: var(--accent); min-height: 16px; margin-bottom: 4px; }
    .error { color: var(--orange); font-size: 11px; margin-bottom: 6px; min-height: 14px; }

    /* Gate */
    .gate {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1.5rem;
      margin-bottom: 1rem;
      display: none;
      animation: fadeUp 0.4s ease;
    }
    .gate.show { display: block; }
    .gate-title { font-family: 'Libre Baskerville', serif; font-style: italic; font-size: 15px; color: var(--text); margin-bottom: 6px; }
    .gate-sub { font-size: 11px; color: var(--sub); margin-bottom: 1rem; line-height: 1.7; }
    .gate-input-row { display: flex; gap: 8px; }
    .gate-input-row input { font-size: 11px; }
    button.verify {
      background: var(--accent);
      border: none;
      border-radius: 4px;
      color: #0A0C0A;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      padding: 10px 16px;
      cursor: pointer;
      font-weight: 700;
      white-space: nowrap;
      transition: opacity 0.2s;
    }
    button.verify:hover { opacity: 0.85; }
    button.verify:disabled { opacity: 0.5; cursor: not-allowed; }
    .gate-error { font-size: 10px; color: var(--orange); margin-top: 6px; min-height: 14px; }

    /* Result card */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1.5rem;
      margin-top: 1.25rem;
      display: none;
      opacity: 0;
      transition: background 0.4s;
    }
    .card.show { display: block; }
    .card.visible { animation: developPhoto 1.2s ease forwards; }

    @keyframes developPhoto {
      0%   { opacity: 0; filter: brightness(2) saturate(0); }
      30%  { opacity: 0.6; filter: brightness(1.3) saturate(0.3); }
      100% { opacity: 1; filter: brightness(1) saturate(1); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .coin-lbl { font-size: 9px; color: var(--sub); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 4px; }
    .coin-name { font-size: 22px; color: var(--accent); font-weight: 700; margin-bottom: 4px; font-family: 'Libre Baskerville', serif; font-style: italic; }
    .coin-meta { font-size: 10px; color: var(--foot); }

    .story {
      font-family: 'Libre Baskerville', serif;
      font-style: italic;
      font-size: 15px;
      line-height: 2;
      color: var(--story-text);
      border-left: 2px solid var(--orange);
      padding-left: 1.25rem;
      margin-top: 1.25rem;
    }

    hr { border: none; border-top: 1px solid var(--border); margin: 1.25rem 0; }
    .tl-lbl { font-size: 9px; color: var(--foot); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 14px; }

    .event { display: flex; gap: 12px; margin-bottom: 12px; align-items: flex-start; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--orange); margin-top: 5px; flex-shrink: 0; }
    .dot.t { background: var(--accent); }
    .dot.g { background: #C4962A; }

    /* Human timestamps instead of block numbers */
    .ev-time { font-size: 10px; color: var(--foot); margin-bottom: 3px; font-style: italic; }
    .ev-text { font-size: 11px; color: var(--ev-text); line-height: 1.6; }
    .addr { font-size: 10px; background: var(--addr-bg); color: var(--accent); border-radius: 2px; padding: 1px 5px; }
    .foot-note { font-size: 9px; color: var(--foot); margin-top: 1.25rem; line-height: 1.8; letter-spacing: 0.02em; }

    .spin { display: inline-block; width: 9px; height: 9px; border: 1px solid transparent; border-top-color: var(--accent); border-radius: 50%; animation: sp 0.7s linear infinite; margin-right: 6px; vertical-align: middle; }
    @keyframes sp { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top-bar">
      <div class="title-block">
        <h1><span id="titleText"></span><span class="cursor" id="titleCursor"></span></h1>
        <p class="sub-rotate" id="subLine"></p>
        <p class="location-card">Base Mainnet &nbsp;·&nbsp; Every block tells a story</p>
      </div>
      <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">☀ Light</button>
    </div>

    <div class="input-row">
      <input id="walletInput" placeholder="Paste a Base wallet address (0x...)" autocomplete="off" spellcheck="false"/>
      <button class="trace" id="traceBtn" onclick="traceWallet()">Trace</button>
    </div>

    <div class="controls-row">
      <div class="demos">
        <span class="demo-lbl">try:</span>
        <button class="demo-btn" onclick="setAddr('0xd8dA6BF26964aF9D7eEd9e03E53415D37aA96045')">vitalik.eth</button>
        <button class="demo-btn" onclick="setAddr('0x4838B106FCe9647Bdf1E7877BF73cE8B0BAD5f97')">hayden.eth</button>
        <button class="demo-btn" onclick="setAddr('0x3cd751e6b0078be393132286c442345e5dc49699')">coinbase hot wallet</button>
      </div>
      <div class="usage-bar">
        <span class="usage-label">Free traces</span>
        <div class="usage-pips">
          <div class="pip" id="pip1"></div>
          <div class="pip" id="pip2"></div>
        </div>
      </div>
    </div>

    <div class="gate" id="gateBox">
      <p class="gate-title">Want to see more?</p>
      <p class="gate-sub">Show me 10,000,000 CLAWD in your wallet and I'll show you everything.</p>
      <div class="gate-input-row">
        <input id="clawdWallet" placeholder="0x... your Base wallet" autocomplete="off" spellcheck="false"/>
        <button class="verify" id="verifyBtn" onclick="verifyClawd()">Show me</button>
      </div>
      <p class="gate-error" id="gateError"></p>
    </div>

    <div class="status" id="statusLine"></div>
    <div class="error" id="errorLine"></div>

    <div class="card" id="resultCard">
      <p class="coin-lbl">Most Interesting Token Found</p>
      <p class="coin-name" id="coinName">—</p>
      <p class="coin-meta" id="coinMeta">—</p>
      <p class="story" id="storyText"></p>
      <hr>
      <p class="tl-lbl">Transfer trail</p>
      <div id="timeline"></div>
      <p class="foot-note">Transfer history via Alchemy &nbsp;·&nbsp; Base mainnet &nbsp;·&nbsp; Labels from curated contract registry</p>
    </div>
  </div>

  <script>
    const LABELS = {
      '0x3154cf16ccdb4c6d922629664174b904d80f2c35':'Base Bridge',
      '0x4200000000000000000000000000000000000006':'WETH',
      '0x833589fcd6edb6e08f4c7c32d4f71b54bda02913':'USDC',
      '0x2626664c2603336e57b271c5c0b26f421741e481':'Uniswap V3 Router',
      '0x000000000000000000000000000000000000dead':'Burn Address',
      '0x4c0c863aa884b8d8e0b25f2e27b9d30a81a35e0e':'Aerodrome Router',
      '0xaaa87963efeb6f7e0a2711f397663105acb1805e':'Aerodrome Pool',
      '0x6921b130d297cc43754afba22e5eac0fbf8db75b':'Base Bridge Official',
      '0x19793c7824be70ec58bb673ca42d2779d12581be':'Moonwell',
      '0x23a491f5c05e8f748cc97bab3d738f2d93ff6e01':'Polymarket',
      '0xdef1c0ded9bec7f1a1670819833240f027b25eff':'0x Exchange',
      '0x1231deb6f5749ef6ce6943a275a1d3e7486f4eae':'LI.FI Router',
    };

    const CLAWD_CONTRACT = '0x9f86dB9fc6f7c9408e8Fda3Ff8ce4e78ac7a6b07';
    const CLAWD_REQUIRED = 10_000_000;

    let usageCount = parseInt(sessionStorage.getItem('ive_seen_usage') || '0');
    let clawdVerified = sessionStorage.getItem('ive_seen_clawd') === 'true';

    function updatePips() {
      document.getElementById('pip1').className = 'pip' + (usageCount >= 1 ? ' used' : '');
      document.getElementById('pip2').className = 'pip' + (usageCount >= 2 ? ' used' : '');
    }
    updatePips();
    function isGated() { return usageCount >= 2 && !clawdVerified; }

    // --- Typewriter title ---
    const TITLE = "I've Seen Things";
    const titleEl = document.getElementById('titleText');
    const cursorEl = document.getElementById('titleCursor');
    let ti = 0;
    function typeTitle() {
      if (ti <= TITLE.length) {
        titleEl.textContent = TITLE.slice(0, ti);
        ti++;
        setTimeout(typeTitle, ti === 1 ? 300 : 55 + Math.random() * 40);
      } else {
        // Remove cursor after a beat
        setTimeout(() => { cursorEl.style.display = 'none'; }, 1800);
      }
    }
    setTimeout(typeTitle, 400);

    // Static subtitle
    document.getElementById('subLine').textContent = 'Every coin has a past. Find yours.';

    // --- Theme toggle ---
    function toggleTheme() {
      const html = document.documentElement;
      const isDark = html.getAttribute('data-theme') === 'dark';
      html.setAttribute('data-theme', isDark ? 'light' : 'dark');
      document.getElementById('themeToggle').textContent = isDark ? '☾ Dark' : '☀ Light';
    }

    function label(addr) {
      if (!addr) return '?';
      return LABELS[addr.toLowerCase()] || (addr.slice(0,6) + '…' + addr.slice(-4));
    }

    // Convert block hex to a rough human date
    function blockToDate(blockHex) {
      try {
        const block = parseInt(blockHex, 16);
        // Base launched ~Aug 2023, block 0. ~2s per block
        const baseGenesis = new Date('2023-08-09T00:00:00Z').getTime();
        const ms = baseGenesis + block * 2000;
        return new Date(ms).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      } catch(e) { return 'Unknown date'; }
    }

    function setAddr(a) { document.getElementById('walletInput').value = a; }
    function setStatus(m) { document.getElementById('statusLine').innerHTML = m ? `<span class="spin"></span>${m}` : ''; }
    function setError(m) { document.getElementById('errorLine').textContent = m || ''; }

    async function verifyClawd() {
      const wallet = document.getElementById('clawdWallet').value.trim();
      const gateError = document.getElementById('gateError');
      gateError.textContent = '';

      if (!/^0x[0-9a-fA-F]{40}$/.test(wallet)) {
        gateError.textContent = 'Enter a valid Base wallet address (0x...)';
        return;
      }

      const btn = document.getElementById('verifyBtn');
      btn.disabled = true;
      btn.textContent = 'Checking…';

      try {
        const res = await fetch('/api/clawd', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ address: wallet })
        });
        const data = await res.json();
        if (data.verified) {
          clawdVerified = true;
          sessionStorage.setItem('ive_seen_clawd', 'true');
          document.getElementById('gateBox').classList.remove('show');
        } else {
          gateError.textContent = `Insufficient CLAWD. Required: 10,000,000. Found: ${(data.balance || 0).toLocaleString()}.`;
        }
      } catch(e) {
        gateError.textContent = 'Verification failed. Try again.';
      }

      btn.disabled = false;
      btn.textContent = 'Verify';
    }

    function scoreTransfer(t) {
      let s = 0;
      if (LABELS[(t.from||'').toLowerCase()]) s += 25;
      if (LABELS[(t.to||'').toLowerCase()]) s += 25;
      const v = parseFloat(t.value||0);
      if (v > 100) s += 20;
      if (v > 1000) s += 20;
      if (t.asset && t.asset !== 'ETH') s += 10;
      s += Math.random() * 5;
      return s;
    }

    async function traceWallet() {
      if (isGated()) {
        document.getElementById('gateBox').classList.add('show');
        return;
      }

      const addr = document.getElementById('walletInput').value.trim();
      setError('');
      const card = document.getElementById('resultCard');
      card.classList.remove('show', 'visible');

      if (!/^0x[0-9a-fA-F]{40}$/.test(addr)) {
        setError('Please enter a valid Base wallet address (0x...)');
        return;
      }

      const btn = document.getElementById('traceBtn');
      btn.disabled = true;

      try {
        setStatus('Scanning transfer history via Alchemy…');
        const res = await fetch('/api/trace', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ address: addr })
        });
        const json = await res.json();
        const transfers = json.result?.transfers || [];

        if (!transfers.length) {
          setStatus('');
          setError('No transfers found for this address on Base. Try a different wallet.');
          btn.disabled = false;
          return;
        }

        setStatus('Picking the most interesting coin…');
        await new Promise(r => setTimeout(r, 300));

        const sorted = [...transfers].sort((a,b) => scoreTransfer(b) - scoreTransfer(a));
        const top = sorted[0];
        const events = sorted.slice(0,6).map(t => ({
          from: t.from, to: t.to,
          asset: t.asset || '?',
          value: parseFloat(t.value||0).toFixed(4),
          block: t.blockNum,
          date: blockToDate(t.blockNum)
        }));

        setStatus('Writing the story…');

        const eventSummary = events.map(e =>
          `  ${e.asset} from ${label(e.from)} → ${label(e.to)}, value: ${e.value}, block: ${e.block}`
        ).join('\n');

        const prompt = `You are writing a short, dramatic, first-person biography of a crypto token on Base blockchain — told from the token's perspective. The tone should be darkly comedic, world-weary, and vivid. The coin has been through it — gambling, degen trades, MEV bots, shady wallets, bridges, swaps. It has seen things and has feelings about them. Reference real on-chain events from the data below.

Wallet: ${addr}
Top token: ${top.asset || 'ETH'}
Recent inbound transfers:
${eventSummary}

Write 4-6 sentences. First person. No markdown. Gambling and chaos should feature prominently if the data supports it. Make it feel like the coin lived a full, chaotic life before landing here. End with dark humor or quiet resignation. Be specific — name Uniswap, Aerodrome, Base Bridge etc. where relevant.`;

        const storyRes = await fetch('/api/story', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt })
        });
        const storyData = await storyRes.json();
        const story = storyData.content?.[0]?.text || 'Story unavailable.';

        usageCount = Math.min(usageCount + 1, 2);
        sessionStorage.setItem('ive_seen_usage', usageCount.toString());
        updatePips();

        document.getElementById('coinName').textContent = top.asset || 'ETH';
        document.getElementById('coinMeta').textContent =
          `${transfers.length} transfers found · Most recent from ${label(top.from)}`;

        const storyEl = document.getElementById('storyText');
        storyEl.textContent = '';

        // Darkroom develop effect
        card.classList.add('show');
        requestAnimationFrame(() => {
          requestAnimationFrame(() => { card.classList.add('visible'); });
        });

        // Typewriter the story
        let i = 0;
        const chars = story.split('');
        function type() { if (i < chars.length) { storyEl.textContent += chars[i++]; setTimeout(type, 18); } }
        setTimeout(type, 400);

        const tl = document.getElementById('timeline');
        const dots = ['t','g',''];
        tl.innerHTML = events.map((e, i) => `
          <div class="event">
            <div class="dot ${dots[i%3]}"></div>
            <div>
              <div class="ev-time">${e.date} &nbsp;·&nbsp; ${e.asset} ${e.value}</div>
              <div class="ev-text">
                <span class="addr">${label(e.from)}</span>
                <span style="color:var(--foot);margin:0 6px">→</span>
                <span class="addr">${label(e.to)}</span>
              </div>
            </div>
          </div>`).join('');

        setStatus('');

        if (isGated()) {
          setTimeout(() => { document.getElementById('gateBox').classList.add('show'); }, 600);
        }

      } catch(e) {
        setStatus('');
        setError('Error: ' + (e.message || 'Something went wrong.'));
      }
      btn.disabled = false;
    }

    document.getElementById('walletInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') traceWallet();
    });

    if (isGated()) document.getElementById('gateBox').classList.add('show');
  </script>
</body>
</html>
